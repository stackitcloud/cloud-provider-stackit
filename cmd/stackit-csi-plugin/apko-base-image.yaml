contents:
  keyring:
  - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  repositories:
  - https://packages.wolfi.dev/os
  packages:
  - busybox # required by fsck.xfs as it is a sh script
  - ca-certificates
  - blkid=~2.41.2
  - blockdev=~2.41.2
  - e2fsprogs=~1.47.3
  - e2fsprogs-extra=~1.47.3
  - lsblk=~2.41.2
  - mount=~2.41.2
  - umount=~2.41.2
  - btrfs-progs=~7.0
  - udev=~258.1
  - util-linux-misc=~2.41.2 # contains fsck
  - xfsprogs=~7.0.1
  - xfsprogs-core=~7.0.1
  - xfsprogs-extra=~7.0.1 # contains xfs_io
  - findmnt=~2.41.2

accounts:
  run-as: root

layering:
  strategy: origin
  budget: 10
